<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin panel · Toolhub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <span class="brand-mark">⌘</span>
        <div>
          <h1>Admin panel</h1>
          <p class="subtitle mono" id="admin-email"></p>
        </div>
      </div>
      <div class="header-actions">
        <a class="btn ghost" href="index.html">View site</a>
        <button id="logout-btn" class="btn ghost">Log out</button>
      </div>
    </div>
  </header>

  <main class="wrap admin-main" id="admin-main" hidden>

    <section class="panel">
      <h2>Site settings</h2>
      <div class="field-row">
        <div class="field">
          <label for="cfg-title">Site title</label>
          <input id="cfg-title" type="text" placeholder="Toolhub">
        </div>
        <div class="field">
          <label for="cfg-subtitle">Tagline</label>
          <input id="cfg-subtitle" type="text" placeholder="Small tools, one shelf.">
        </div>
      </div>
      <button id="save-config-btn" class="btn primary">Save settings</button>
      <span id="config-status" class="status"></span>
    </section>

    <section class="panel">
      <h2 id="form-heading">Add a tool</h2>
      <div class="field-row">
        <div class="field small-field">
          <label for="tool-icon">Icon (emoji)</label>
          <input id="tool-icon" type="text" maxlength="4" placeholder="🧰">
        </div>
        <div class="field">
          <label for="tool-name">Name</label>
          <input id="tool-name" type="text" placeholder="Unit converter">
        </div>
      </div>
      <div class="field">
        <label for="tool-desc">Description</label>
        <input id="tool-desc" type="text" placeholder="One line about what it does">
      </div>
      <div class="field">
        <label for="tool-url">Link (URL or relative path like tools/converter.html)</label>
        <input id="tool-url" type="text" placeholder="tools/converter/">
      </div>
      <p id="tool-form-error" class="error" role="alert" hidden></p>
      <div class="btn-row">
        <button id="save-tool-btn" class="btn primary">Add tool</button>
        <button id="cancel-edit-btn" class="btn ghost" hidden>Cancel edit</button>
      </div>
    </section>

    <section class="panel">
      <h2>Tools <span id="admin-tool-count" class="mono muted"></span></h2>
      <div id="admin-tool-list" class="admin-tool-list">
        <p class="loading">Loading…</p>
      </div>
    </section>

  </main>

  <p id="auth-checking" class="wrap loading">Checking sign-in…</p>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
