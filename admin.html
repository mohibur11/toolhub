<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin panel · Toolhub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <span class="brand-mark">⌘</span>
        <div>
          <h1>Admin panel</h1>
          <p class="subtitle mono" id="admin-email"></p>
        </div>
      </div>
      <div class="header-actions">
        <a class="btn ghost" href="index.html">View site</a>
        <button id="logout-btn" class="btn ghost">Log out</button>
      </div>
    </div>
  </header>

  <main class="wrap admin-main" id="admin-main" hidden>

    <section class="panel">
      <h2>DPDC tariff rates</h2>
      <p class="muted small" style="margin-top:-0.5rem">
        Set every rate used by the DPDC Bill Calculator. Structure (voltage levels, consumer
        classes, slab bands) is fixed in code; here you edit the numbers. Energy rates are in
        Taka/kWh, demand charges in Taka/kW/month.
      </p>
      <div class="field-row">
        <div class="field small-field">
          <label for="tf-effective">Effective</label>
          <input id="tf-effective" type="text" placeholder="June 2026">
        </div>
        <div class="field small-field">
          <label for="tf-vat">VAT (%)</label>
          <input id="tf-vat" type="number" min="0" step="0.1" placeholder="5">
        </div>
      </div>

      <div id="tariff-editor" class="tariff-editor">
        <p class="loading">Loading rates…</p>
      </div>

      <p id="tariff-error" class="error" role="alert" hidden></p>
      <div class="btn-row" style="margin-top:1rem">
        <button id="save-tariff-btn" class="btn primary">Save tariff</button>
        <button id="reset-tariff-btn" class="btn ghost">Reset to code defaults</button>
        <span id="tariff-status" class="status"></span>
      </div>
    </section>

  </main>

  <p id="auth-checking" class="wrap loading">Checking sign-in…</p>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
